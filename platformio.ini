; GLIDE — continuous-pitch polyphonic slide synth for the M5Stack Cardputer ADV
;
;   cardputer-adv : the instrument        -> pio run                  -> dist/GLIDE.bin
;   phase0-probe  : hardware risk probe   -> pio run -e phase0-probe  (audio streaming + key rollover)
;   native        : host build of the pure DSP core (portability gate) -> pio run -e native
;
; Flash via bmorcelli Launcher: copy dist/GLIDE.bin to /apps/ on the SD card.
; Direct USB flash (overwrites Launcher): pio run -t upload
;   (entry: power OFF, hold G0, plug USB-C, release G0)

[platformio]
default_envs = cardputer-adv

[base]
; shared device settings — the exact stack the proven sibling firmwares use
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_build.partitions = partitions.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
build_flags =
    -DESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    m5stack/M5Cardputer@^1.1.1

[env:cardputer-adv]
extends = base
build_src_filter =
    +<*>
    -<phase0_probe.cpp>
    -<test_dsp.cpp>
extra_scripts = post:support/copy_dist.py

[env:phase0-probe]
extends = base
build_src_filter =
    +<phase0_probe.cpp>
extra_scripts = post:support/copy_dist.py

[env:native]
platform = native
build_flags =
    -std=gnu++14
    -O2
    -DGLIDE_HOST_BUILD
build_src_filter =
    +<test_dsp.cpp>
    +<dsp/>
